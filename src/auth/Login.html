<div id="header-title"></div>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
    
    <!-- Logo en haut à gauche -->
    <div class="absolute top-6 left-6">
        <div class="flex items-center gap-2 bg-white px-3 py-2 rounded-lg shadow-sm">
            <div class="w-6 h-6 bg-black rounded flex items-center justify-center">
                <span class="text-white text-xs font-bold">E</span>
            </div>
            <span class="font-semibold text-gray-800">Ebolt</span>
        </div>
    </div>

    <!-- Card de connexion -->
    <div class="w-full max-w-md">
        <div class="bg-white/40 backdrop-blur-md rounded-3xl shadow-xl p-8">
            
            <!-- Icône -->
            <div class="flex justify-center mb-6">
                <div class="bg-white w-14 h-14 rounded-2xl shadow-md flex items-center justify-center">
                    <i class="fas fa-arrow-right-to-bracket text-gray-700 text-xl"></i>
                </div>
            </div>

            <!-- Titre -->
            <h1 class="text-2xl font-bold text-gray-800 text-center mb-2">
                Sign in with email
            </h1>
            
            <!-- Description -->
            <p class="text-sm text-gray-500 text-center mb-8">
                Make a new doc to bring your words, data,<br>and teams together. For free
            </p>

            <!-- Formulaire -->
            <form class="space-y-4">
                <!-- Champ Email -->
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fas fa-envelope text-sm"></i>
                    </div>
                    <input 
                        type="email" 
                        placeholder="Email" 
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent text-sm"
                    >
                </div>

                <!-- Champ Password -->
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fas fa-lock text-sm"></i>
                    </div>
                    <input 
                        type="password" 
                        placeholder="Password" 
                        class="w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent text-sm"
                    >
                    <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye-slash text-sm"></i>
                    </button>
                </div>

                <!-- Mot de passe oublié -->
                <div class="text-right">
                    <a href="#" class="text-xs text-gray-500 hover:text-gray-700">
                        Forgot password?
                    </a>
                </div>

                <!-- Bouton Get Started -->
                <button 
                    type="submit" 
                    class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-3 rounded-xl transition duration-200 shadow-lg"
                >
                    Get Started
                </button>
            </form>

            <!-- Séparateur -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-gray-300"></div>
                <span class="text-xs text-gray-400">Or sign in with</span>
                <div class="flex-1 h-px bg-gray-300"></div>
            </div>

            <!-- Boutons sociaux -->
            <div class="flex justify-center gap-4">
                <!-- Google -->
                <button class="w-12 h-12 bg-white hover:bg-gray-50 rounded-xl shadow-md flex items-center justify-center transition duration-200">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                </button>

                <!-- Facebook -->
                <button class="w-12 h-12 bg-white hover:bg-gray-50 rounded-xl shadow-md flex items-center justify-center transition duration-200">
                    <i class="fab fa-facebook-f text-blue-600 text-xl"></i>
                </button>

                <!-- Apple -->
                <button class="w-12 h-12 bg-white hover:bg-gray-50 rounded-xl shadow-md flex items-center justify-center transition duration-200">
                    <i class="fab fa-apple text-gray-800 text-2xl"></i>
                </button>
            </div>

        </div>
    </div>
  <script  src="../script/script.js">
    </script>
</body>
</html>
